<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenQuadro Community</title>
<link rel="icon" href="assets/icon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menu" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="#" class="logo">
      <img src="assets/icon.png" alt="OpenQuadro" width="26" height="26">
      <span class="text">Open<span class="brand-accent">Quadro</span></span>
    </a>
  </div>

  <div class="topbar-search">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Pesquisar quadros..." autocomplete="off">
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>
  </div>

  <div class="topbar-right">
    <button class="search-icon-btn" id="mobileSearchBtn" aria-label="Pesquisar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>

    <div style="position:relative;">
      <button class="icon-btn" id="gearBtn" aria-label="Definições" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="dropdown" id="gearDropdown" role="menu">
        <div class="dropdown-label">Tema</div>
        <button type="button" class="dropdown-option" id="themeLightBtn" data-theme="light" role="menuitemradio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          Claro
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button type="button" class="dropdown-option" id="themeDarkBtn" data-theme="dark" role="menuitemradio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Escuro
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
    </div>

    <div style="position:relative;">
      <button class="icon-btn" id="userBtn" aria-label="Perfil" aria-haspopup="true" aria-expanded="false" style="border-radius:50%;">
        <div class="avatar" id="topAvatar">--</div>
      </button>
      <div class="dropdown" id="userDropdown" role="menu">
        <div class="profile-block">
          <div class="avatar avatar-lg" id="profileAvatarLg">--</div>
          <div class="profile-info">
            <div class="profile-name" id="profileNameText"></div>
            <div class="profile-email" id="profileEmailText"></div>
          </div>
          <button type="button" class="ghost-btn" id="editProfileBtn" title="Editar perfil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="topBars">
  <div class="mobile-search-bar" id="mobileSearchBar">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInputMobile" placeholder="Pesquisar quadros..." autocomplete="off">
      <div class="search-suggestions" id="searchSuggestionsMobile"></div>
    </div>
    <button class="close-x" id="closeMobileSearch" aria-label="Fechar pesquisa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
</div>

<div class="overlay" id="overlay" aria-hidden="true"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-label mono">Os meus quadros</div>
  <ul class="board-list" id="boardList"></ul>

  <button class="new-board-btn" id="newBoardBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Novo quadro</span>
  </button>

  <button class="collapse-toggle" id="collapseBtn" aria-expanded="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span class="collapse-label">Colapsar</span>
  </button>
</div>

<div class="content" id="content"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Título</h3>
      <button class="modal-close" id="modalClose" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="modalDeleteBtn" style="display:none">Eliminar</button>
      <div style="flex:1"></div>
      <button class="btn" id="modalCancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="modalSaveBtn">Guardar</button>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>

</body>
</html>
